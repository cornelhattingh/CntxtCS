                  - text: "\"out\": RecordID(\"posts\", 123),"
                  - text: "})"
                  - text: db.insert_relation("likes", [
                  - text: "{\"in\": RecordID(\"users\", \"tobie\"), \"out\": RecordID(\"posts\", 123)},"
                  - text: "{\"in\": RecordID(\"users\", \"jaime\"), \"out\": RecordID(\"posts\", 456)},"
                  - text: "])"
                - button "Copy code" [ref=e196] [cursor=pointer]
          - heading "Replacing records" [level=2] [ref=e199]:
            - text: Replacing records
            - link [ref=e200] [cursor=pointer]:
              - /url: "#replacing-records"
          - paragraph [ref=e202]:
            - text: The
            - code [ref=e203]: .update()
            - text: method replaces the entire content of a record or all records in a table. Any fields not included in the new data are removed.
          - generic [ref=e204]:
            - tablist [ref=e205]:
              - tab "Synchronous" [selected] [ref=e206] [cursor=pointer]:
                - generic [ref=e207]: Synchronous
              - tab "Asynchronous" [ref=e208] [cursor=pointer]:
                - generic [ref=e209]: Asynchronous
            - tabpanel "Synchronous" [ref=e210]:
              - generic [ref=e212]:
                - generic [ref=e213]:
                  - text: from surrealdb import RecordID
                  - text: "db.update(RecordID(\"users\", \"tobie\"), {"
                  - text: "\"name\": \"Tobie\","
                  - text: "\"email\": \"tobie@surrealdb.com\","
                  - text: "\"active\": True,"
                  - text: "})"
                  - text: "db.update(\"users\", {\"active\": False})"
                - button "Copy code" [ref=e214] [cursor=pointer]
          - alert "Note" [ref=e217]:
            - generic [ref=e219]:
              - heading "Note" [level=6] [ref=e224]
              - paragraph [ref=e226]:
                - text: Because
                - code [ref=e227]: .update()
                - text: performs a full replacement, omitted fields are deleted from the record. Use
                - code [ref=e228]: .merge()
                - text: if you want to preserve existing fields.
          - heading "Upserting records" [level=2] [ref=e229]:
            - text: Upserting records
            - link [ref=e230] [cursor=pointer]:
              - /url: "#upserting-records"
          - paragraph [ref=e232]:
            - text: The
            - code [ref=e233]: .upsert()
            - text: method creates a record if it does not already exist, or replaces it entirely if it does. This combines the behavior of
            - code [ref=e234]: .create()
            - text: and
            - code [ref=e235]: .update()
            - text: in a single operation.
          - generic [ref=e236]:
            - tablist [ref=e237]:
              - tab "Synchronous" [selected] [ref=e238] [cursor=pointer]:
                - generic [ref=e239]: Synchronous
              - tab "Asynchronous" [ref=e240] [cursor=pointer]:
                - generic [ref=e241]: Asynchronous
            - tabpanel "Synchronous" [ref=e242]:
              - generic [ref=e244]:
                - generic [ref=e245]:
                  - text: from surrealdb import RecordID
                  - text: "db.upsert(RecordID(\"users\", \"tobie\"), {"
                  - text: "\"name\": \"Tobie\","
                  - text: "\"email\": \"tobie@surrealdb.com\","
                  - text: "\"active\": True,"
                  - text: "})"
                - button "Copy code" [ref=e246] [cursor=pointer]
          - heading "Merging data" [level=2] [ref=e249]:
            - text: Merging data
            - link [ref=e250] [cursor=pointer]:
              - /url: "#merging-data"
          - paragraph [ref=e252]:
            - text: The
            - code [ref=e253]: .merge()
            - text: method deep-merges the provided data into the existing record, preserving any fields that are not mentioned in the merge payload. This is useful for partial updates.
          - generic [ref=e254]:
            - tablist [ref=e255]:
              - tab "Synchronous" [selected] [ref=e256] [cursor=pointer]:
                - generic [ref=e257]: Synchronous
              - tab "Asynchronous" [ref=e258] [cursor=pointer]:
