          - heading "Targeting tables and records" [level=2] [ref=e107]:
            - text: Targeting tables and records
            - link [ref=e108] [cursor=pointer]:
              - /url: "#targeting-tables-and-records"
          - paragraph [ref=e110]:
            - text: Most data manipulation methods accept a
            - code [ref=e111]: record
            - text: parameter that determines the scope of the operation. You can pass a table name as a string to target all records in that table, or a
            - link "RecordID" [ref=e112] [cursor=pointer]:
              - /url: /docs/languages/python/api/values/record-id
            - text: to target a specific record.
          - generic [ref=e114]:
            - generic [ref=e115]:
              - text: from surrealdb import RecordID
              - text: db.select("users")
              - text: db.select(RecordID("users", "tobie"))
            - button "Copy code" [ref=e116] [cursor=pointer]
          - paragraph [ref=e119]:
            - text: When a string is passed, the operation applies to the entire table. When a
            - code [ref=e120]: RecordID
            - text: is passed, it applies to the single record identified by that ID. See the
            - link "RecordID reference" [ref=e121] [cursor=pointer]:
              - /url: /docs/languages/python/api/values/record-id
            - text: for more on constructing record identifiers.
          - heading "Selecting records" [level=2] [ref=e122]:
            - text: Selecting records
            - link [ref=e123] [cursor=pointer]:
              - /url: "#selecting-records"
          - paragraph [ref=e125]:
            - text: The
            - code [ref=e126]: .select()
            - text: method retrieves records from the database. Pass a table name to get all records, or a
            - code [ref=e127]: RecordID
            - text: to get a single record.
          - generic [ref=e128]:
            - tablist [ref=e129]:
              - tab "Synchronous" [selected] [ref=e130] [cursor=pointer]:
                - generic [ref=e131]: Synchronous
              - tab "Asynchronous" [ref=e132] [cursor=pointer]:
                - generic [ref=e133]: Asynchronous
            - tabpanel "Synchronous" [ref=e134]:
              - generic [ref=e136]:
                - generic [ref=e137]:
                  - text: from surrealdb import Surreal, RecordID
                  - text: "with Surreal(\"ws://localhost:8000\") as db:"
                  - text: db.use("surrealdb", "docs")
                  - text: "db.signin({\"username\": \"root\", \"password\": \"root\"})"
                  - text: all_users = db.select("users")
                  - text: tobie = db.select(RecordID("users", "tobie"))
                - button "Copy code" [ref=e138] [cursor=pointer]
          - paragraph [ref=e141]:
            - text: When selecting a table, the method returns a list. When selecting a specific record, it returns a single value or
            - code [ref=e142]: None
            - text: if the record does not exist.
          - heading "Creating records" [level=2] [ref=e143]:
            - text: Creating records
            - link [ref=e144] [cursor=pointer]:
              - /url: "#creating-records"
          - paragraph [ref=e146]:
            - text: The
            - code [ref=e147]: .create()
            - text: method creates a new record. Pass a table name to generate a random ID, or a
            - code [ref=e148]: RecordID
            - text: to specify the ID explicitly.
          - generic [ref=e149]:
            - tablist [ref=e150]:
              - tab "Synchronous" [selected] [ref=e151] [cursor=pointer]:
                - generic [ref=e152]: Synchronous
              - tab "Asynchronous" [ref=e153] [cursor=pointer]:
                - generic [ref=e154]: Asynchronous
            - tabpanel "Synchronous" [ref=e155]:
              - generic [ref=e157]:
                - generic [ref=e158]:
                  - text: from surrealdb import RecordID
                  - text: "user = db.create(\"users\", {"
                  - text: "\"name\": \"Alice\","
                  - text: "\"email\": \"alice@example.com\","
                  - text: "\"age\": 30,"
                  - text: "})"
                  - text: "specific = db.create(RecordID(\"users\", \"tobie\"), {"
                  - text: "\"name\": \"Tobie\","
                  - text: "\"email\": \"tobie@surrealdb.com\","
                  - text: "\"age\": 35,"
                  - text: "})"
                - button "Copy code" [ref=e159] [cursor=pointer]
          - paragraph [ref=e162]:
            - text: The method returns the created record, including any server-generated fields such as the
            - code [ref=e163]: id
            - text: .
          - heading "Inserting records" [level=2] [ref=e164]:
            - text: Inserting records
            - link [ref=e165] [cursor=pointer]:
              - /url: "#inserting-records"
          - paragraph [ref=e167]:
            - text: The
            - code [ref=e168]: .insert()
            - text: method inserts one or more records into a table. This is useful for bulk operations where you need to add multiple records at once.
          - generic [ref=e169]:
            - tablist [ref=e170]:
              - tab "Synchronous" [selected] [ref=e171] [cursor=pointer]:
                - generic [ref=e172]: Synchronous
              - tab "Asynchronous" [ref=e173] [cursor=pointer]:
                - generic [ref=e174]: Asynchronous
            - tabpanel "Synchronous" [ref=e175]:
              - generic [ref=e177]:
                - generic [ref=e178]:
                  - text: "db.insert(\"users\", {\"name\": \"Alice\", \"age\": 30})"
                  - text: db.insert("users", [
                  - text: "{\"name\": \"Bob\", \"age\": 25},"
                  - text: "{\"name\": \"Charlie\", \"age\": 40},"
                  - text: "])"
                - button "Copy code" [ref=e179] [cursor=pointer]
          - paragraph [ref=e182]:
            - text: The
            - code [ref=e183]: .insert_relation()
            - text: method works the same way but is designed for creating graph edges between records. Each record must include
            - code [ref=e184]: in
            - text: and
            - code [ref=e185]: out
            - text: fields pointing to the connected records.
          - generic [ref=e186]:
            - tablist [ref=e187]:
              - tab "Synchronous" [selected] [ref=e188] [cursor=pointer]:
                - generic [ref=e189]: Synchronous
              - tab "Asynchronous" [ref=e190] [cursor=pointer]:
