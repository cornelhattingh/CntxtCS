                  - text: "db.merge(\"users\", {"
                  - text: "\"updated_at\": \"2026-02-25T12:00:00Z\","
                  - text: "})"
                - button "Copy code" [ref=e264] [cursor=pointer]
          - paragraph [ref=e267]:
            - text: In the example above, only the
            - code [ref=e268]: settings.active
            - text: field is changed on the specific record. All other fields on the record remain untouched.
          - heading "Applying patches" [level=2] [ref=e269]:
            - text: Applying patches
            - link [ref=e270] [cursor=pointer]:
              - /url: "#applying-patches"
          - paragraph [ref=e272]:
            - text: The
            - code [ref=e273]: .patch()
            - text: method applies
            - link "JSON Patch (RFC 6902)" [ref=e274] [cursor=pointer]:
              - /url: https://jsonpatch.com/
            - text: operations to a record or all records in a table. Each operation is a dictionary with
            - code [ref=e275]: op
            - text: ","
            - code [ref=e276]: path
            - text: ", and optionally"
            - code [ref=e277]: value
            - text: fields.
          - generic [ref=e278]:
            - tablist [ref=e279]:
              - tab "Synchronous" [selected] [ref=e280] [cursor=pointer]:
                - generic [ref=e281]: Synchronous
              - tab "Asynchronous" [ref=e282] [cursor=pointer]:
